<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LiveWire v2.4.0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!--
    LiveWire v2.4.0
    - Sticky neon header
    - Theme toggle (light/dark)
    - Animated hamburger → X
    - Screen router (Home, Venues, Venue Detail, Settings)
    - LocalStorage-backed venues + events
    - Stubs for deep-discovery ingestion + proxy-based fetching
    - Time-based views (Tonight, Tomorrow, Weekend, All Upcoming) – UI + basic filtering
    NOTE: The "deep discovery" and scraping are stubbed client-side; for real scraping
    you’ll want a backend or a dedicated proxy you control.
  -->

  <style>
    :root {
      --bg-dark: #050515;
      --bg-dark-elevated: #0b0b25;
      --bg-light: #f4f6ff;
      --bg-light-elevated: #ffffff;
      --text-dark: #f5f7ff;
      --text-light: #111322;
      --neon-blue: #4dd0ff;
      --neon-pink: #ff4dd0;
      --accent-muted: #7a7f9a;
      --card-radius: 12px;
      --transition-fast: 0.18s ease-out;
      --transition-med: 0.25s ease;
      --header-height: 60px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      background: var(--bg-dark);
      color: var(--text-dark);
      transition: background var(--transition-med), color var(--transition-med);
      overflow-y: scroll;
    }

    body.theme-light {
      background: var(--bg-light);
      color: var(--text-light);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app-shell {
      max-width: 960px;
      margin: 0 auto;
      padding: 12px 14px 40px;
    }

    /* ---------------------------------------------------------
       HEADER — STICKY, NEON, RESPONSIVE, COMPACT ON SCROLL
    --------------------------------------------------------- */
    .header {
      position: sticky;
      top: 0;
      z-index: 10;

      display: flex;
      justify-content: space-between;
      align-items: center;

      padding: 6px 6px 10px 0;
      margin-bottom: 12px;

      min-width: 0;

      background: rgba(10, 10, 30, 0.9);
      backdrop-filter: blur(12px);

      border-bottom: 1px solid rgba(77, 208, 255, 0.25);
      box-shadow: 0 2px 10px rgba(77, 208, 255, 0.15);

      transition: padding var(--transition-fast), box-shadow var(--transition-fast),
        background var(--transition-fast), transform var(--transition-fast);
    }

    body.theme-light .header {
      background: rgba(240, 245, 255, 0.9);
      border-bottom: 1px solid rgba(0, 0, 40, 0.12);
      box-shadow: 0 2px 10px rgba(0, 0, 40, 0.1);
    }

    /* Compact header state when scrolling */
    .header.compact {
      padding-top: 2px;
      padding-bottom: 6px;
      box-shadow: 0 1px 6px rgba(77, 208, 255, 0.12);
      transform: translateY(-2px);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 1;
      min-width: 0;
    }

    .header-left h1 {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 60vw;
      font-size: 22px;
      letter-spacing: 0.5px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    /* Hamburger / menu icon */
    .hamburger {
      width: 28px;
      height: 22px;
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
    }

    .hamburger-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      border-radius: 999px;
      background: var(--neon-blue);
      box-shadow: 0 0 6px rgba(77, 208, 255, 0.8);
      transition: transform var(--transition-fast), opacity var(--transition-fast),
        top var(--transition-fast), bottom var(--transition-fast);
    }

    .hamburger-line:nth-child(1) {
      top: 0;
    }

    .hamburger-line:nth-child(2) {
      top: 10px;
    }

    .hamburger-line:nth-child(3) {
      bottom: 0;
    }

    .hamburger.open .hamburger-line:nth-child(1) {
      top: 10px;
      transform: rotate(45deg);
    }

    .hamburger.open .hamburger-line:nth-child(2) {
      opacity: 0;
    }

    .hamburger.open .hamburger-line:nth-child(3) {
      bottom: 10px;
      transform: rotate(-45deg);
    }

    /* Theme toggle (sun/moon) */
    .theme-toggle {
      flex-shrink: 0;
      font-size: 22px;
      cursor: pointer;
      padding-left: 8px;
      color: var(--neon-blue);
      text-shadow: 0 0 6px rgba(77, 208, 255, 0.9);
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .theme-toggle:hover {
      transform: scale(1.15);
      opacity: 0.85;
    }

    /* Neon underline for active nav */
    .nav-tabs {
      display: flex;
      gap: 16px;
      margin-top: 4px;
      font-size: 14px;
    }

    .nav-tab {
      position: relative;
      cursor: pointer;
      color: var(--accent-muted);
      transition: color var(--transition-fast);
    }

    .nav-tab.active {
      color: var(--neon-blue);
    }

    .nav-tab::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -4px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
      transform: scaleX(0);
      transform-origin: center;
      transition: transform 0.2s ease-out;
      box-shadow: 0 0 8px rgba(77, 208, 255, 0.7);
    }

    .nav-tab.active::after {
      transform: scaleX(1);
    }

    /* ---------------------------------------------------------
       MAIN CONTENT + SCREENS
    --------------------------------------------------------- */
    .screen-container {
      position: relative;
      min-height: calc(100vh - var(--header-height) - 40px);
    }

    .screen {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transform: translateX(8px);
      transition: opacity 0.22s ease-out, transform 0.22s ease-out;
    }

    .screen.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
    }

    .screen-inner {
      padding-top: 4px;
    }

    .screen-title {
      font-size: 18px;
      margin-bottom: 6px;
    }

    .screen-subtitle {
      font-size: 14px;
      color: var(--accent-muted);
      margin-bottom: 16px;
    }

    /* Cards / panels */
    .card {
      background: var(--bg-dark-elevated);
      border-radius: var(--card-radius);
      padding: 12px 14px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.03);
      transition: background var(--transition-med), transform var(--transition-fast),
        box-shadow var(--transition-fast), border-color var(--transition-fast);
    }

    body.theme-light .card {
      background: var(--bg-light-elevated);
      border-color: rgba(0, 0, 40, 0.06);
      box-shadow: 0 1px 4px rgba(0, 0, 40, 0.08);
    }

    .card:hover {
      transform: translateY(-1px);
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.45);
      border-color: rgba(77, 208, 255, 0.25);
    }

    body.theme-light .card:hover {
      box-shadow: 0 3px 10px rgba(0, 0, 40, 0.12);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .card-title {
      font-weight: 600;
      font-size: 15px;
    }

    .card-meta {
      font-size: 12px;
      color: var(--accent-muted);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      background
