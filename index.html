<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LiveWire v2.2</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #111;
        color: white;
        font-family: system-ui, sans-serif;
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        perspective: 2000px;
    }

    .device {
        width: 360px;
        height: 720px;
        background: #222;
        border-radius: 28px;
        border: 4px solid #000;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
        overflow: hidden;
        transform-style: preserve-3d;
        transition: transform 0.9s ease;
        position: relative;
    }

    .device.flipped {
        transform: rotateY(180deg);
    }

    .screen {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        display: flex;
        flex-direction: column;
        padding: 20px;
        box-sizing: border-box;
    }

    .back {
        transform: rotateY(180deg);
        background: #1a1a1a;
    }

    h1 {
        margin-top: 0;
        font-size: 28px;
        text-align: center;
        letter-spacing: 1px;
    }

    button {
        padding: 14px;
        margin: 10px 0;
        background: #ff0066;
        border: none;
        border-radius: 10px;
        color: white;
        font-size: 18px;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #ff3385;
    }

    .log {
        margin-top: 20px;
        padding: 10px;
        background: #000;
        border-radius: 8px;
        height: 200px;
        overflow-y: auto;
        font-size: 14px;
    }
</style>
</head>

<body>

<div class="device" id="device">
    <!-- FRONT SCREEN -->
    <div class="screen front">
        <h1>LiveWire v2.2</h1>
        <button onclick="flip()">Flip Device</button>
        <button onclick="addVenue()">Add Venue</button>
        <button onclick="clearVenues()">Clear Venues</button>
        <div class="log" id="log"></div>
    </div>

    <!-- BACK SCREEN -->
    <div class="screen back">
        <h1>Back Side</h1>
        <button onclick="flip()">Flip Back</button>
    </div>
</div>

<script>
    const device = document.getElementById("device");
    const logBox = document.getElementById("log");

    function flip() {
        device.classList.toggle("flipped");
        log("Device flipped");
    }

    function log(msg) {
        const time = new Date().toLocaleTimeString();
        logBox.innerHTML += `[${time}] ${msg}<br>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    function addVenue() {
        const name = prompt("Enter venue name:");
        if (!name) return;

        let venues = JSON.parse(localStorage.getItem("venues") || "[]");
        venues.push({ name, added: new Date().toISOString() });
        localStorage.setItem("venues", JSON.stringify(venues));

        log(`Added venue: ${name}`);
    }

    function clearVenues() {
        if (confirm("Clear all saved venues?")) {
            localStorage.removeItem("venues");
            log("All venues cleared");
        }
    }

    log("LiveWire v2.2 loaded");
</script>

</body>
</html>
