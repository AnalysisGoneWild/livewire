<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LiveWire</title>

<style>
/* ---------------------------------------------------------
   GLOBAL THEME VARIABLES
--------------------------------------------------------- */
:root {
  --bg: #f7f7f7;
  --fg: #111;
  --accent: #007aff;
  --card-bg: #ffffff;
  --border: #d0d0d0;
  --pill-bg: #e5e5e5;
  --pill-fg: #111;
}

/* DAY PALETTE A */
.theme-a {
  --bg: #f7f7f7;
  --fg: #111;
  --accent: #007aff;
  --card-bg: #ffffff;
  --border: #d0d0d0;
  --pill-bg: #e5e5e5;
  --pill-fg: #111;
}

/* DAY PALETTE B */
.theme-b {
  --bg: #fff8f0;
  --fg: #3a2e1f;
  --accent: #ff7a00;
  --card-bg: #ffffff;
  --border: #e2c9a8;
  --pill-bg: #ffe2c4;
  --pill-fg: #3a2e1f;
}

/* DAY PALETTE C */
.theme-c {
  --bg: #eef7ff;
  --fg: #0f1b2d;
  --accent: #0066cc;
  --card-bg: #ffffff;
  --border: #bcd4f0;
  --pill-bg: #d9eaff;
  --pill-fg: #0f1b2d;
}

/* DAY PALETTE D */
.theme-d {
  --bg: #f0fff4;
  --fg: #0f2d1b;
  --accent: #00a86b;
  --card-bg: #ffffff;
  --border: #b8e6cf;
  --pill-bg: #d6f5e6;
  --pill-fg: #0f2d1b;
}

/* NIGHT MODE */
.night {
  --bg: #0d0d0d;
  --fg: #f5f5f5;
  --accent: #4da3ff;
  --card-bg: #1a1a1a;
  --border: #333;
  --pill-bg: #333;
  --pill-fg: #f5f5f5;
}

/* ---------------------------------------------------------
   BASE LAYOUT
--------------------------------------------------------- */
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: var(--bg);
  color: var(--fg);
  transition: background 0.3s, color 0.3s;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--card-bg);
  position: sticky;
  top: 0;
  z-index: 10;
}

h1 {
  margin: 0;
  font-size: 22px;
  font-weight: 600;
}

.controls {
  display: flex;
  gap: 10px;
}

button {
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--fg);
  cursor: pointer;
  font-size: 14px;
  transition: 0.2s;
}

button:hover {
  border-color: var(--accent);
  color: var(--accent);
}

#themeBtn {
  font-weight: 600;
}

#nightBtn {
  font-weight: 600;
}

/* ---------------------------------------------------------
   INPUT AREA
--------------------------------------------------------- */
#inputArea {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--fg);
  font-size: 15px;
}

textarea {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--fg);
  font-size: 15px;
  min-height: 120px;
}

/* ---------------------------------------------------------
   TRACK LIST
--------------------------------------------------------- */
#tracks {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.track {
  padding: 14px;
  border-radius: 10px;
  background: var(--card-bg);
  border: 1px solid var(--border);
}

.track-title {
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 6px;
}

.pill {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11px;
  background: var(--pill-bg);
  color: var(--pill-fg);
  margin-right: 6px;
}
</style>
</head>

<body class="theme-a">

<header>
  <h1>LiveWire</h1>
  <div class="controls">
    <button id="themeBtn">Theme</button>
    <button id="nightBtn">Night</button>
  </div>
</header>

<div id="inputArea">
  <input id="urlInput" placeholder="Paste a URL to scrape…" />
  <textarea id="notesInput" placeholder="Or type/paste tracklist manually…"></textarea>
  <button id="saveBtn">Save</button>
</div>

<div id="tracks"></div>

<script>
/* ---------------------------------------------------------
   THEME CYCLER + NIGHT MODE
--------------------------------------------------------- */
let themes = ["theme-a", "theme-b", "theme-c", "theme-d"];
let themeIndex = 0;
let night = false;

const body = document.body;
const themeBtn = document.getElementById("themeBtn");
const nightBtn = document.getElementById("nightBtn");

themeBtn.onclick = () => {
  if (night) return; // disable cycling while in night mode
  themeIndex = (themeIndex + 1) % themes.length;
  body.className = themes[themeIndex];
};

nightBtn.onclick = () => {
  night = !night;
  if (night) {
    body.classList.add("night");
  } else {
    body.classList.remove("night");
    body.className = themes[themeIndex];
  }
};

/* ---------------------------------------------------------
   SCRAPING + PARSING
--------------------------------------------------------- */
async function scrapeURL(url) {
  try {
    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
    const data = await res.json();
    return data.contents;
  } catch (e) {
    alert("Scrape failed.");
    return "";
  }
}

function parseTracks(text) {
  const lines = text.split("\n").map(l => l.trim()).filter(l => l);
  return lines.map(l => ({ title: l }));
}

/* ---------------------------------------------------------
   RENDER
--------------------------------------------------------- */
function renderTracks(list) {
  const container = document.getElementById("tracks");
  container.innerHTML = "";

  list.forEach(t => {
    const div = document.createElement("div");
    div.className = "track";

    div.innerHTML = `
      <div class="track-title">${t.title}</div>
      <span class="pill">Track</span>
    `;

    container.appendChild(div);
  });
}

/* ---------------------------------------------------------
   SAVE HANDLER
--------------------------------------------------------- */
document.getElementById("saveBtn").onclick = async () => {
  const url = document.getElementById("urlInput").value.trim();
  const notes = document.getElementById("notesInput").value.trim();

  let text = notes;

  if (url) {
    const scraped = await scrapeURL(url);
    text = scraped;
  }

  const tracks = parseTracks(text);
  renderTracks(tracks);
};
</script>

</body>
</html>
